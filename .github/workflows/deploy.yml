name: Build and Deploy YouTube Clone

on:
  push:
    branches:
      - main  # Triggers the deployment whenever you push your code to the main branch

permissions:
  contents: write  # Grants GitHub permission to create and write to the gh-pages deployment branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out your repository code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Set up a clean Node.js environment (Cache bypassed to prevent path resolution errors)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Step 3: Install all dependencies inside your subfolder
      - name: Install Dependencies
        run: |
          cd youtube-clone
          npm install

      # Step 4: Compile and build the production assets
      - name: Build Application
        run: |
          cd youtube-clone
          npm run build

      # Step 5: Deploy the bundle folder to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: youtube-clone/dist  # Tells GitHub to upload the 'dist' folder generated by Vite
          branch: gh-pages            # The dedicated hosting branch GitHub Pages reads from
